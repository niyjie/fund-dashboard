<!DOCTYPE html>
<html lang="zh-CN">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>基金驾驶舱 V5</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="container">

<h1>📈 基金驾驶舱</h1>

<div class="summary">

<div class="card">
<h3>总投入</h3>
<div id="totalInvested">0</div>
</div>

<div class="card">
<h3>当前市值</h3>
<div id="currentValue">0</div>
</div>

<div class="card">
<h3>累计盈利</h3>
<div id="profit">0</div>
</div>

<div class="card">
<h3>收益率</h3>
<div id="profitRate">0%</div>
</div>

</div>

<h2>新增定投记录</h2>

<div class="fund-card">

<select id="fundName">

<option value="易方达科创50联接C（100609）">
易方达科创50联接C（100609）
</option>

<option value="易方达沪深300ETF联接A（110020）">
易方达沪深300ETF联接A（110020）
</option>

</select>

<input id="amount"
type="number"
placeholder="投入金额">

<input id="currentValueInput"
type="number"
step="0.01"
placeholder="当前市值">

<input id="investDate"
type="date">

<button onclick="saveInvestment()">
保存记录
</button>

</div>

<h2>持仓汇总</h2>

<div id="summaryFunds"></div>

<h2>投资日历</h2>

<select id="calendarYear"></select>

<select id="calendarMonth"></select>

<div id="calendar"></div>

<div id="dayDetail"></div>

</div>

<script src="app.js"></script>

</body>

</html>
